name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t task-manager:latest .
      - name: Push image to GitHub Container Registry
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Using built-in GITHUB_TOKEN to authenticate to ghcr is not supported here; configure your registry and token as needed." 
      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_SERVICE_ID && secrets.RENDER_API_KEY }}
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Triggering Render deploy for service $RENDER_SERVICE_ID"
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":false}'
      - name: Render deploy instructions
        if: ${{ !secrets.RENDER_SERVICE_ID || !secrets.RENDER_API_KEY }}
        run: |
          echo "To auto-deploy to Render create a service and add two repo secrets: RENDER_SERVICE_ID and RENDER_API_KEY"
