<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Task Manager</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/env.js"></script>
  <script defer src="/app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand" aria-label="AI Task Manager">
        <div class="brand-mark" aria-hidden="true">✓</div>
        <div>
          <div class="brand-title">AI Task Manager</div>
          <div class="brand-subtitle">Plan • Focus • Ship</div>
        </div>
      </div>
      <div class="topbar-actions">
        <div id="userName" class="user-name" aria-live="polite"></div>
        <button id="logout" class="btn btn-ghost" type="button">Logout</button>
      </div>
    </header>

    <main class="container">
      <section id="auth" class="grid">
        <div class="card auth-card">
          <h2 class="h2">Create an account</h2>
          <div class="form">
            <label class="label" for="reg_name">Name</label>
            <input id="reg_name" autocomplete="name" placeholder="Your name" />

            <label class="label" for="reg_email">Email</label>
            <input id="reg_email" autocomplete="email" placeholder="you@example.com" />

            <label class="label" for="reg_password">Password</label>
            <input id="reg_password" placeholder="••••••••" type="password" autocomplete="new-password" />

            <button id="register" class="btn btn-primary" type="button">Register</button>
          </div>
        </div>

        <div class="card auth-card">
          <h2 class="h2">Sign in</h2>
          <div class="form">
            <label class="label" for="login_email">Email</label>
            <input id="login_email" autocomplete="email" placeholder="you@example.com" />

            <label class="label" for="login_password">Password</label>
            <input id="login_password" placeholder="••••••••" type="password" autocomplete="current-password" />

            <button id="login" class="btn btn-primary" type="button">Login</button>
          </div>
        </div>
      </section>

      <section id="app" class="dashboard" style="display:none;">
        <div class="dash-grid">
          <section class="card panel">
            <div class="panel-header">
              <h2 class="h2">New task</h2>
              <div class="hint">Keep it small. Make it real.</div>
            </div>

            <div class="form">
              <label class="label" for="title">Title</label>
              <input id="title" placeholder="e.g. Finish UI refresh" />

              <div class="two-col">
                <div>
                  <label class="label" for="due_date">Due date</label>
                  <input id="due_date" type="date" />
                </div>
                <div>
                  <label class="label" for="description">Status</label>
                  <select id="initial_completed" aria-label="Initial status">
                    <option value="0" selected>Active</option>
                    <option value="1">Completed</option>
                  </select>
                </div>
              </div>

              <label class="label" for="description">Description</label>
              <textarea id="description" placeholder="Add details (optional)"></textarea>

              <button id="add" class="btn btn-accent" type="button">Add task</button>
            </div>
          </section>

          <section class="card panel">
            <div class="panel-header">
              <h2 class="h2">Tasks</h2>
              <div class="filters" role="tablist" aria-label="Task filters">
                <button class="filter is-active" data-filter="all" type="button" role="tab" aria-selected="true">All</button>
                <button class="filter" data-filter="active" type="button" role="tab" aria-selected="false">Active</button>
                <button class="filter" data-filter="done" type="button" role="tab" aria-selected="false">Done</button>
              </div>
            </div>

            <div id="taskStatus" class="status-row" aria-live="polite"></div>
            <div id="taskList" class="task-list" aria-live="polite" aria-busy="false"></div>

            <div id="emptyState" class="empty" style="display:none;">
              <div class="empty-emoji" aria-hidden="true">🗒️</div>
              <div class="empty-title">No tasks yet</div>
              <div class="empty-sub">Add one on the left to get started.</div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
